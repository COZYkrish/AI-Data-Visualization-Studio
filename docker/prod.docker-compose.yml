version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: studio_prod_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: studio_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d studio_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    build:
      context: ../apps/backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: studio_prod_backend
    environment:
      - ENV=production
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=studio_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    container_name: studio_prod_frontend
    ports:
      - "3000:3000"
    restart: always

volumes:
  pgdata:
