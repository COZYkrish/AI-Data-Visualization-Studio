version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: studio_dev_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: studio_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d studio_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../apps/backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: studio_dev_backend
    environment:
      - ENV=development
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=studio_db
    ports:
      - "8000:8000"
    volumes:
      - ../apps/backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
      target: builder
    container_name: studio_dev_frontend
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ../apps/frontend:/workspace/apps/frontend
      - ../packages:/workspace/packages
    command: pnpm --filter @studio/frontend dev --host 0.0.0.0

volumes:
  pgdata:
